<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OI班主任模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
#app {
  width: 100%;
  max-width: 720px;
  min-height: 100vh;
  background: linear-gradient(180deg, #0d0d24 0%, #141430 100%);
  padding: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* Title */
#title-screen { justify-content: center; align-items: center; text-align: center; }
#title-screen h1 { font-size: 2.2em; color: #7ecfff; margin-bottom: 8px; }
#title-screen .subtitle { color: #8899aa; font-size: 0.95em; margin-bottom: 32px; }
#title-screen .btn { margin: 6px 0; }

/* Buttons */
.btn {
  background: linear-gradient(135deg, #2a3a5c, #1a2a4c);
  border: 1px solid #3a5a8c;
  color: #c0d0e0;
  padding: 10px 24px;
  cursor: pointer;
  font-size: 0.95em;
  border-radius: 6px;
  transition: all 0.2s;
  display: inline-block;
  text-align: center;
}
.btn:hover { background: linear-gradient(135deg, #3a5a8c, #2a4a7c); color: #fff; }
.btn.primary { background: linear-gradient(135deg, #5a7acc, #3a5aac); border-color: #7a9aee; color: #fff; }
.btn.primary:hover { background: linear-gradient(135deg, #6a8aee, #4a6acc); }
.btn.danger { background: linear-gradient(135deg, #5c2a2a, #4c1a1a); border-color: #8c3a3a; }
.btn.small { padding: 5px 12px; font-size: 0.8em; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Status Bar */
#status-bar {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.stat-card {
  background: #111128;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 10px 12px;
  text-align: center;
}
.stat-card .label { font-size: 0.75em; color: #8899aa; }
.stat-card .value { font-size: 1.4em; font-weight: bold; }
.stat-bar {
  height: 4px; background: #2a2a4a; border-radius: 2px;
  margin-top: 6px; overflow: hidden;
}
.stat-bar .fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.fill.teaching { background: #5a9eff; }
.fill.reputation { background: #ff9e5a; }
.fill.energy { background: #5aff9e; }
.fill.budget { background: #ffd95a; }
.fill.school { background: #ff5a9e; }

/* Achievements bar */
#achievements-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
  min-height: 0;
}
#achievements-bar:empty { display: none; }
.achievement-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: #1a2a4a;
  border: 1px solid #3a4a6a;
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 0.7em;
  color: #667799;
  opacity: 0.4;
  transition: all 0.3s;
}
.achievement-badge.unlocked {
  background: #1a3a2a;
  border-color: #5acc7a;
  color: #7ecfff;
  opacity: 1;
}

/* Achievement toast */
#achievement-toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: linear-gradient(135deg, #1a3a2a, #0a2a1a);
  border: 1px solid #5acc7a;
  border-radius: 10px;
  padding: 12px 24px;
  z-index: 200;
  text-align: center;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  box-shadow: 0 4px 20px rgba(90, 255, 158, 0.3);
}
#achievement-toast.show {
  transform: translateX(-50%) translateY(0);
}
#achievement-toast .toast-label {
  font-size: 0.7em;
  color: #5acc7a;
  margin-bottom: 4px;
}
#achievement-toast .toast-name {
  font-size: 1em;
  font-weight: bold;
  color: #e0ffe0;
}

/* Week transition overlay */
#week-transition {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10, 10, 26, 0.92);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
#week-transition.show {
  opacity: 1;
  pointer-events: auto;
}
#week-transition .wt-week {
  font-size: 2.4em;
  font-weight: bold;
  color: #7ecfff;
  margin-bottom: 6px;
}
#week-transition .wt-semester {
  font-size: 1em;
  color: #ff9e5a;
}
#week-transition .wt-competition {
  margin-top: 12px;
  font-size: 0.9em;
  color: #ff5a9e;
}

/* Info row */
#info-row {
  display: flex; gap: 10px; margin-bottom: 12px;
  font-size: 0.85em; color: #8899aa;
}
#info-row .week { color: #7ecfff; font-weight: bold; }
#info-row .semester { color: #ff9e5a; }

/* Students */
#students-panel { margin-bottom: 12px; }
#students-panel h3 { font-size: 0.9em; color: #8899aa; margin-bottom: 6px; }
.student-card {
  background: #111128;
  border: 1px solid #2a2a4a;
  border-radius: 6px;
  padding: 8px 12px;
  margin-bottom: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85em;
}
.student-card .s-name { font-weight: bold; min-width: 60px; }
.student-card .s-stats { display: flex; gap: 10px; font-size: 0.8em; color: #aabbcc; }
.student-card .s-stats span { white-space: nowrap; }
.student-card .s-mood { font-size: 1.1em; min-width: 24px; text-align: center; }

/* Log */
#log-area {
  flex: 1;
  background: #0c0c1e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 12px;
  overflow-y: auto;
  margin-bottom: 12px;
  max-height: 260px;
}
.log-entry {
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1a1a3a;
  font-size: 0.85em;
  line-height: 1.5;
}
.log-entry:last-child { border-bottom: none; }
.log-entry .time { color: #5a7acc; font-size: 0.8em; margin-right: 6px; }
.log-entry.event { color: #ffcc5a; }
.log-entry.competition { color: #ff5a9e; }
.log-entry.system { color: #5aff9e; }
.log-entry.achievement { color: #5acc7a; }

/* Actions */
#actions-panel h3 { font-size: 0.9em; color: #8899aa; margin-bottom: 6px; }
#actions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 12px;
}
.action-btn {
  background: #111128;
  border: 1px solid #2a2a4a;
  border-radius: 6px;
  padding: 10px;
  cursor: pointer;
  text-align: left;
  font-size: 0.85em;
  color: #c0d0e0;
  transition: all 0.2s;
}
.action-btn:hover { background: #1a1a3a; border-color: #4a5a8c; }
.action-btn .action-name { font-weight: bold; color: #7ecfff; }
.action-btn .action-cost { font-size: 0.75em; color: #8899aa; margin-top: 2px; }
.action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* Bottom bar */
#bottom-bar {
  display: flex; gap: 8px; justify-content: center;
  padding-top: 8px;
  border-top: 1px solid #2a2a4a;
}

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.75); display: none;
  justify-content: center; align-items: center; z-index: 100;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #141430; border: 1px solid #4a5a8c; border-radius: 12px;
  padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal h2 { color: #7ecfff; margin-bottom: 12px; font-size: 1.2em; }
.modal .desc { color: #aabbcc; margin-bottom: 16px; line-height: 1.6; font-size: 0.9em; }
.modal .choices { display: flex; flex-direction: column; gap: 8px; }
.modal .choice-btn {
  background: #111128; border: 1px solid #3a5a8c; border-radius: 8px;
  padding: 12px; cursor: pointer; text-align: left; color: #e0e0e0;
  transition: all 0.2s;
}
.modal .choice-btn:hover { background: #1a1a4a; border-color: #5a7acc; }
.modal .choice-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.modal .choice-btn .c-title { font-weight: bold; color: #7ecfff; }
.modal .choice-btn .c-effect { font-size: 0.8em; color: #8899aa; margin-top: 4px; }

/* Ending */
#ending-screen { justify-content: center; align-items: center; text-align: center; }
#ending-screen h2 { color: #ffcc5a; font-size: 1.8em; margin-bottom: 8px; }
#ending-screen .ending-title { color: #ff9e5a; font-size: 1.3em; margin-bottom: 16px; }
#ending-screen .ending-desc { color: #aabbcc; line-height: 1.8; margin-bottom: 24px; max-width: 500px; }
#ending-screen .stats-summary { color: #8899aa; font-size: 0.85em; margin-bottom: 12px; }
#ending-screen .achievements-summary {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;
  max-width: 500px; margin-bottom: 20px;
}
#ending-screen .achievements-summary .achievement-badge {
  font-size: 0.75em;
}

/* Intro */
#intro-screen { justify-content: center; align-items: center; text-align: center; }
#intro-screen p { color: #aabbcc; line-height: 1.8; margin-bottom: 24px; max-width: 500px; font-size: 0.95em; }
#intro-screen .highlight { color: #7ecfff; }

.stress-high { color: #ff5a5a !important; }
.score-high { color: #5aff9e !important; }
.algo-elite { color: #5aff9e !important; font-weight: bold; }
</style>
</head>
<body>
<div id="app">

<!-- Title Screen -->
<div id="title-screen" class="screen active">
  <h1>🏫 OI班主任模拟器</h1>
  <div class="subtitle">你是一位信息学竞赛班的班主任<br>带领学生从NOIP冲到NOI，在高压下生存两年</div>
  <button class="btn primary" onclick="startGame()">新游戏</button>
  <button class="btn" id="btn-load" onclick="loadGame()" disabled>继续游戏</button>
</div>

<!-- Intro -->
<div id="intro-screen" class="screen">
  <p>
    <span class="highlight">新学期开始了。</span><br><br>
    校长把你叫到办公室：<br>
    "这个竞赛班交给你了，两年时间。<br>
    我要看到省一以上的成绩。<br>
    经费不多，你看着办。"<br><br>
    你看着手中的学生名单——<br>
    五个孩子，五个可能性。<br><br>
    <span class="highlight">每周，你最多可以做3件事。</span><br>
    管理班级、教书、搞关系、应付检查…<br>
    你的精力有限，但野心不妨大一点。
  </p>
  <button class="btn primary" onclick="beginGame()">接过名单，开始</button>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen">
  <div id="status-bar">
    <div class="stat-card">
      <div class="label">教学水平</div>
      <div class="value" id="v-teaching">50</div>
      <div class="stat-bar"><div class="fill teaching" id="b-teaching"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">声望</div>
      <div class="value" id="v-reputation">20</div>
      <div class="stat-bar"><div class="fill reputation" id="b-reputation"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">精力</div>
      <div class="value" id="v-energy">100</div>
      <div class="stat-bar"><div class="fill energy" id="b-energy"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">经费</div>
      <div class="value" id="v-budget">30</div>
      <div class="stat-bar"><div class="fill budget" id="b-budget"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">学校好感</div>
      <div class="value" id="v-school">50</div>
      <div class="stat-bar"><div class="fill school" id="b-school"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">行动剩余</div>
      <div class="value" id="v-actions">3</div>
    </div>
  </div>

  <div id="achievements-bar"></div>

  <div id="info-row">
    <span class="semester" id="info-semester"></span>
    <span class="week" id="info-week"></span>
    <span style="margin-left:auto" id="info-action"></span>
  </div>

  <div id="students-panel">
    <h3>👥 学生档案</h3>
    <div id="students-list"></div>
  </div>

  <div id="actions-panel">
    <h3>📋 本周行动（选择3项）</h3>
    <div id="actions-grid"></div>
  </div>

  <div id="log-area"></div>

  <div id="bottom-bar">
    <button class="btn small" onclick="saveGame()">💾 存档</button>
    <button class="btn small danger" onclick="resetGame()">🔄 重开</button>
  </div>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="event-modal">
  <div class="modal" id="event-content"></div>
</div>

<!-- Achievement Toast -->
<div id="achievement-toast">
  <div class="toast-label">🏆 成就解锁！</div>
  <div class="toast-name" id="toast-achievement-name"></div>
</div>

<!-- Week Transition Overlay -->
<div id="week-transition">
  <div class="wt-week" id="wt-week"></div>
  <div class="wt-semester" id="wt-semester"></div>
  <div class="wt-competition" id="wt-competition"></div>
</div>

<!-- Ending Screen -->
<div id="ending-screen" class="screen"></div>

</div>

<script>
// ==================== 数据定义 ====================

const SAVE_VERSION = 3;
const HISTORY_MAX = 200;

const STUDENT_TEMPLATES = [
  { name: '陈锐', gender: '男', archetype: '神犇',
    algo: 65, math: 70, mental: 60, effort: 55, exp: 40, desc: '初三自学完C++，高一已有省二水平，是班里的标杆' },
  { name: '林小雨', gender: '女', archetype: '卷王',
    algo: 45, math: 60, mental: 45, effort: 80, exp: 25, desc: '天赋一般但极其努力，每天最后一个离开机房' },
  { name: '张浩宇', gender: '男', archetype: '天赋流',
    algo: 55, math: 80, mental: 70, effort: 30, exp: 35, desc: '脑子好使但爱摸鱼，经常在OJ上划水' },
  { name: '王思远', gender: '男', archetype: '学弱',
    algo: 30, math: 45, mental: 40, effort: 50, exp: 15, desc: '基础薄弱，被家长逼来的，需要特别关注' },
  { name: '赵欣然', gender: '女', archetype: '黑马',
    algo: 40, math: 65, mental: 75, effort: 65, exp: 20, desc: '心态极好，总能超常发挥，潜力未知' }
];

const WEEKLY_ACTIONS = [
  { id: 'teach', name: '精心备课', icon: '📖',
    cost: { energy: -15 }, effect: { teaching: 5 },
    studentBoost: { algo: [2,4], mental: [-2,0] },
    desc: '深入准备本周课程，提升教学质量' },
  { id: 'mock', name: '组织模拟赛', icon: '🏆',
    cost: { energy: -20, budget: -5 }, effect: { teaching: 3, reputation: 3 },
    studentBoost: { algo: [3,6], exp: [2,4], mental: [-5,0] },
    desc: '举办一次内部模拟赛，锻炼实战能力' },
  { id: 'tutor', name: '个别辅导', icon: '🎯',
    cost: { energy: -15 }, effect: { teaching: 2 },
    studentTarget: { algo: [8,15], mental: [3,8] },
    desc: '针对最薄弱学生进行一对一辅导（自动选目标）' },
  { id: 'report', name: '写教学报告', icon: '📝',
    cost: { energy: -10 }, effect: { schoolFavor: 8 },
    desc: '向校领导汇报竞赛班进展，争取支持' },
  { id: 'lobby', name: '申请额外经费', icon: '💰',
    cost: { energy: -10 }, effect: { budget: [10,20], schoolFavor: [-5,3] },
    desc: '软磨硬泡向学校要钱，但可能惹恼领导' },
  { id: 'rest', name: '休息调整', icon: '😴',
    cost: {}, effect: { energy: 30 },
    studentBoost: { mental: [2,5] },
    desc: '给自己放个假，也给学生们喘口气' },
  { id: 'outreach', name: '邀请外校交流', icon: '🤝',
    cost: { energy: -15, budget: -8 }, effect: { reputation: 5, teaching: 3 },
    studentBoost: { algo: [2,5], exp: [3,6] },
    desc: '联系其他学校的竞赛教练，组织联合训练' },
  { id: 'algorithm', name: '专题算法课', icon: '🧮',
    cost: { energy: -20 }, effect: { teaching: 6 },
    studentBoost: { algo: [3,7], exp: [1,3], mental: [-3,0] },
    desc: '集中攻克某个高难度算法专题' },
  { id: 'buy_book', name: '购置竞赛书籍', icon: '📚',
    cost: { budget: -10 }, effect: { teaching: 2 },
    studentBoost: { algo: [1,3], math: [1,3], mental: [1,3] },
    desc: '添置最新的OI参考书和学习资料' },
  { id: 'mental_care', name: '心理疏导', icon: '💬',
    cost: { energy: -10 }, effect: { reputation: 2 },
    studentBoost: { mental: [5,12] },
    desc: '找学生们聊聊，缓解竞赛压力' },
  { id: 'cf_train', name: 'CF/ATC刷题', icon: '💻',
    cost: { energy: -12 }, effect: { teaching: 2 },
    studentBoost: { algo: [2,5], effort: [3,6], mental: [-3,2] },
    desc: '带学生在线实战，培养手感' },
  { id: 'skip', name: '摆烂摸鱼', icon: '🦥',
    cost: {}, effect: { energy: 15, schoolFavor: -5 },
    studentBoost: { mental: [3,8], algo: [-3,0] },
    desc: '这周累了，大家一起摸了吧' },
];

// ==================== 随机事件（延迟求值 studentFx） ====================

function makeRandomEvents() {
  return [
    { id: 'parent_call', title: '家长来电',
      text: '王思远的妈妈打来电话："老师，我家孩子最近状态怎么样？他很努力吧？"',
      condition: () => true, weight: 8,
      choices: [
        { text: '如实汇报，建议多鼓励', effect: { schoolFavor: 2 },
          studentFx: [{ name: '王思远', mental: 5, effort: 5 }] },
        { text: '打哈哈应付过去', effect: { schoolFavor: -2 },
          studentFx: [{ name: '王思远', mental: -5 }] },
      ]
    },
    { id: 'student_burnout', title: '机房深夜的哭声',
      text: '你晚上路过机房，听到里面有人在小声啜泣。推门一看，林小雨趴在键盘上哭了。',
      condition: () => getStudent('林小雨')?.stats.mental < 35, weight: 12,
      choices: [
        { text: '带她去吃宵夜，聊聊', effect: { energy: -5 },
          studentFx: [{ name: '林小雨', mental: 15, effort: 5 }] },
        { text: '让她回家休息一天', effect: { energy: -3 },
          studentFx: [{ name: '林小雨', mental: 10, algo: -3 }] },
        { text: '"这点苦都吃不了怎么打OI"', effect: {},
          studentFx: [{ name: '林小雨', mental: -15, effort: 10 }] },
      ]
    },
    { id: 'prodigy_showoff', title: '凡尔赛现场',
      text: '陈锐在群里发了一条消息："这次CF又掉分了，只有2600…" 其他学生心态微妙。',
      condition: () => getStudent('陈锐')?.stats.algo > 55, weight: 10,
      choices: [
        { text: '私下提醒陈锐注意措辞', effect: { reputation: 1 },
          studentFx: [{ name: '陈锐', mental: -3 }, { name: '张浩宇', effort: 5 }] },
        { text: '无视，让学生自己消化', effect: {},
          studentFx: [{ name: '张浩宇', mental: -8 }, { name: '王思远', mental: -10 }] },
      ]
    },
    { id: 'school_inspect', title: '校领导突击检查',
      text: '副校长突然推门进机房："你们班最近成绩怎么样？马上要期中了，别光搞竞赛！"',
      condition: () => true, weight: 8,
      choices: [
        { text: '拿出最近的模拟赛成绩单', effect: { schoolFavor: [5,10], reputation: 2 },
          condition: () => game.teacher.teaching > 40 },
        { text: '承诺会抓紧文化课', effect: { schoolFavor: 5 } },
        { text: '硬刚："竞赛和文化课是两码事"', effect: { schoolFavor: -15, reputation: 3 } },

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function randRange(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }
function randPick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function initGame() {
  game = {
    version: SAVE_VERSION,
    week: 1,
    semester: 1,
    actionsLeft: ACTIONS_PER_WEEK,
    ended: false,
    endingType: null,
    teacher: { teaching: 50, reputation: 20, energy: 100, budget: 30, schoolFavor: 50 },
    students: STUDENT_TEMPLATES.map(t => ({
      name: t.name, archetype: t.archetype, desc: t.desc,

    })),
    history: [],
    achievements: [],
    competitionsDone: [],
    eventsSeen: [],
    weeklyLog: [],
    skipCount: 0,
  };
  runtimeCounters = { skipCount: 0 };
  RANDOM_EVENTS = makeRandomEvents();
}

function startGame() {
  initGame();
  showScreen('intro-screen');
  checkSaveExists();
}

function beginGame() {
  showScreen('game-screen');
  renderAll();
  autoSave();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== 渲染 ====================

function renderAll() {
  if (game.ended) { showEnding(); return; }
  renderStats();
  renderAchievements();
  renderStudents();
  renderActions();
  renderLog();
  renderInfo();
}

function renderStats() {
  const t = game.teacher;
  const setStat = (id, val, max) => {
    document.getElementById('v-' + id).textContent = Math.round(val);
    document.getElementById('b-' + id).style.width = (val / max * 100) + '%';
  };
  setStat('teaching', t.teaching, 100);
  setStat('reputation', t.reputation, 100);
  setStat('energy', t.energy, 100);
  setStat('budget', t.budget, 100);
  setStat('school', t.schoolFavor, 100);
  document.getElementById('v-actions').textContent = game.actionsLeft;
}

function renderAchievements() {
  const bar = document.getElementById('achievements-bar');
  if (!game.achievements || game.achievements.length === 0 && ACHIEVEMENTS.length === 0) {
    bar.innerHTML = '';
    return;
  }
  bar.innerHTML = ACHIEVEMENTS.map(a => {
    const unlocked = game.achievements.includes(a.id);
    return `<span class="achievement-badge ${unlocked ? 'unlocked' : ''}" title="${a.desc}">
      ${a.name}
    </span>`;
  }).join('');
}

function renderInfo() {
  document.getElementById('info-semester').textContent = SEMESTER_NAMES[game.semester - 1];
  document.getElementById('info-week').textContent = '第' + game.week + '周';
  document.getElementById('info-action').textContent = '剩余行动：' + game.actionsLeft + '/' + ACTIONS_PER_WEEK;
}

function getMoodIcon(mental) {
  if (mental >= 75) return '😄'; if (mental >= 55) return '🙂';
  if (mental >= 35) return '😐'; if (mental >= 20) return '😟';
  return '😭';
}

function renderStudents() {
  const list = document.getElementById('students-list');
  list.innerHTML = game.students.map(s => {
    const st = s.stats;
    const mentalClass = st.mental < 30 ? 'stress-high' : '';
    const algoClass = st.algo >= 80 ? 'algo-elite' : '';
    return `<div class="student-card">
      <span class="s-name">${s.name}</span>
      <span class="s-stats">
        <span class="${algoClass}">🧠算法${st.algo}</span>
        <span>📐数学${st.math}</span>
        <span>💪努力${st.effort}</span>
        <span>🏅经验${st.exp}</span>
      </span>
      <span class="s-mood ${mentalClass}" title="心理状态: ${st.mental}">${getMoodIcon(st.mental)}</span>
    </div>`;
  }).join('');
}

function renderActions() {
  const grid = document.getElementById('actions-grid');
  const available = game.actionsLeft > 0;
  grid.innerHTML = WEEKLY_ACTIONS.map(a => {
    const canAfford = checkActionCost(a);
    const disabled = !available || !canAfford;
    return `<button class="action-btn" ${disabled ? 'disabled' : ''}
      onclick="doAction('${a.id}')">
      <div class="action-name">${a.icon} ${a.name}</div>
      <div class="action-cost">${a.desc}</div>
    </button>`;
  }).join('');
}

function checkActionCost(action) {
  const t = game.teacher;
  const cost = action.cost;
  if (cost.energy && (t.energy + cost.energy) < 0) return false;
  if (cost.budget && (t.budget + cost.budget) < 0) return false;
  return true;
}

// ==================== 行动系统 ====================

function doAction(actionId) {
  if (game.actionsLeft <= 0 || game.ended) return;
  const action = WEEKLY_ACTIONS.find(a => a.id === actionId);
  if (!action) return;

  // 追踪摆烂次数
  if (actionId === 'skip') {
    game.skipCount = (game.skipCount || 0) + 1;
    runtimeCounters.skipCount = game.skipCount;
  }

  applyEffects(game.teacher, action.effect);
  applyEffects(game.teacher, action.cost);

  if (action.studentBoost) {
    for (const st of game.students) {
      for (const [key, range] of Object.entries(action.studentBoost)) {
        st.stats[key] = clamp(st.stats[key] + randRange(range[0], range[1]), 0, 100);
      }
    }
  }

  if (action.studentTarget) {
    const byAlgo = [...game.students].sort((a,b) => a.stats.algo - b.stats.algo);
    const byMental = [...game.students].sort((a,b) => a.stats.mental - b.stats.mental);
    const targets = [byAlgo[0]];
    if (byMental[0].name !== byAlgo[0].name) targets.push(byMental[0]);
    for (const tgt of targets) {
      for (const [key, range] of Object.entries(action.studentTarget)) {
        tgt.stats[key] = clamp(tgt.stats[key] + randRange(range[0], range[1]), 0, 100);
      }
    }
    addLog('system', `🎯 辅导目标：${targets.map(t => t.name).join('、')}`);
  }

  clampTeacher();
  addLog('system', `${action.icon} 你选择了：${action.name}`);

  // 行动后检查成就
  checkAchievements();

  game.actionsLeft--;

  if (game.actionsLeft <= 0) {
    setTimeout(() => endWeek(), 300);
  }

  renderAll();
}

function clampTeacher() {
  const t = game.teacher;
  t.teaching = clamp(t.teaching, 0, 100);
  t.reputation = clamp(t.reputation, 0, 100);
  t.energy = clamp(t.energy, 0, 100);
  t.budget = clamp(t.budget, 0, 100);
  t.schoolFavor = clamp(t.schoolFavor, 0, 100);
}

// ==================== 周结束 ====================

function endWeek() {
  // 检查是否有未触发的竞赛
  const comp = COMPETITIONS.find(c =>
    c.week <= game.week &&
    !game.competitionsDone.includes(c.id)
  );
  if (comp) {
    triggerCompetition(comp);
    return;
  }

  // 随机事件（55% 概率）
  const availEvents = RANDOM_EVENTS.filter(e =>
    !game.eventsSeen.includes(e.id) &&
    e.condition() &&
    Math.random() < 0.55
  );
  if (availEvents.length > 0) {
    triggerEvent(randPick(availEvents));
    return;
  }

  advanceWeek();
}

// ==================== 竞赛系统 ====================

function triggerCompetition(comp) {
  game.competitionsDone.push(comp.id);
  const results = evaluateCompetition(comp);

  // 应用竞赛效果
  for (const r of results.students) {
    const st = game.students.find(s => s.name === r.name);
    if (st) {
      st.stats.algo = clamp(st.stats.algo + r.algoGain, 0, 100);
      st.stats.exp = clamp(st.stats.exp + r.expGain, 0, 100);
      st.stats.mental = clamp(st.stats.mental + r.mentalChange, 0, 100);
    }
  }

  const repGain = results.baseRep * (1 + results.topPerf * comp.multiFactor);
  game.teacher.reputation = clamp(game.teacher.reputation + Math.round(repGain), 0, 100);
  addLog('competition', `🏆 ${comp.name}：${results.description}`);

  // 竞赛后检查成就
  checkAchievements({ competition: comp, results });

  // 弹窗
  const modal = document.getElementById('event-modal');
  const content = document.getElementById('event-content');
  let html = `<h2>🏆 ${comp.name}</h2>`;
  html += `<p class="desc">第${game.week}周 — ${comp.desc}</p>`;
  html += `<div style="margin-bottom:16px">`;
  for (const r of results.students) {
    html += `<div style="padding:6px 0;font-size:0.85em;border-bottom:1px solid #1a1a3a">
      <b>${r.name}</b>: <b style="color:${r.color}">${r.result}</b><br>
      <span style="color:#8899aa;font-size:0.8em">
        算法${r.algo} → ${Math.round(game.students.find(s=>s.name===r.name)?.stats.algo || 0)} |
        经验${r.exp} → ${Math.round(game.students.find(s=>s.name===r.name)?.stats.exp || 0)} |
        心理${r.mental} → ${Math.round(game.students.find(s=>s.name===r.name)?.stats.mental || 0)}
      </span>
    </div>`;
  }
  html += `</div>`;
  html += `<div style="color:#8899aa;font-size:0.85em;margin-bottom:12px">
    📊 总计：${results.medaled}/${results.students.length}人获奖，${results.topPerf}人高分 | 声望 +${Math.round(repGain)}
  </div>`;
  html += `<button class="btn primary" onclick="afterCompetition(${comp.isFinal ? 'true' : 'false'})">继续</button>`;
  content.innerHTML = html;
  modal.classList.add('active');
}

function afterCompetition(isFinal) {
  document.getElementById('event-modal').classList.remove('active');

  game.week++;
  updateSemester();
  autoSave();

  if (isFinal || game.week > TOTAL_WEEKS) {
    determineEnding();
    return;
  }

  game.actionsLeft = ACTIONS_PER_WEEK;

  // 周过渡动画
  showWeekTransition();

  renderAll();
}

function evaluateCompetition(comp) {
  const students = game.students.map(s => {
    const st = s.stats;
    const score = st.algo * 0.5 + st.math * 0.15 + st.exp * 0.2 + st.effort * 0.1 + st.mental * 0.05;
    const luck = randRange(-10, 10);
    const total = score + luck;
    let result, color, algoGain, expGain, mentalChange;
    if (total >= 70) { result = '🥇 一等奖/金牌'; color = '#ffcc00'; algoGain = randRange(5, 10); expGain = randRange(5, 10); mentalChange = randRange(5, 15); }
    else if (total >= 55) { result = '🥈 二等奖/银牌'; color = '#c0c0c0'; algoGain = randRange(3, 7); expGain = randRange(3, 7); mentalChange = randRange(0, 10); }
    else if (total >= 40) { result = '🥉 三等奖/铜牌'; color = '#cd7f32'; algoGain = randRange(1, 4); expGain = randRange(1, 4); mentalChange = randRange(-5, 5); }
    else { result = '❌ 未获奖'; color = '#ff5a5a'; algoGain = randRange(0, 2); expGain = randRange(0, 2); mentalChange = randRange(-15, -5); }
    return { name: s.name, result, color, algo: st.algo, exp: st.exp, mental: st.mental, algoGain, expGain, mentalChange, score: total };
  });

  const topPerf = students.filter(s => s.score >= 70).length;
  const medaled = students.filter(s => s.score >= 40).length;
  return { students, topPerf, medaled, baseRep: comp.baseReward.reputation, description: `${medaled}/${students.length}人获奖，${topPerf}人高分` };
}

// ==================== 事件系统 ====================

function triggerEvent(event) {
  game.eventsSeen.push(event.id);
  const modal = document.getElementById('event-modal');
  const content = document.getElementById('event-content');
  let html = `<h2>📢 ${event.title}</h2>`;
  html += `<p class="desc">${event.text}</p>`;
  html += `<div class="choices">`;
  event.choices.forEach((ch, i) => {
    const fxDesc = describeChoiceEffects(ch);
    const condFail = ch.condition && !ch.condition();
    html += `<button class="choice-btn" ${condFail ? 'disabled' : ''} onclick="resolveEvent('${event.id}', ${i})">
      <div class="c-title">${ch.text}</div>
      <div class="c-effect">${condFail ? '（条件不满足）' : fxDesc}</div>
    </button>`;
  });
  html += `</div>`;
  content.innerHTML = html;
  modal.classList.add('active');
}

function describeChoiceEffects(ch) {
  const parts = [];
  if (ch.effect) {
    for (const [k, v] of Object.entries(ch.effect)) {
      const label = EFFECT_LABELS[k] || k;
      if (Array.isArray(v)) {
        parts.push(`${label}${v[0] > 0 ? '+' : ''}${v[0]}~${v[1]}`);
      } else {
        parts.push(`${label}${v > 0 ? '+' : ''}${v}`);
      }
    }
  }
  if (ch.studentFx) {
    const fxList = resolveStudentFx(ch.studentFx);
    if (fxList.length > 0) {
      parts.push(fxList.map(s => s.name).join('、') + '受影响');
    }
  }
  return parts.join(' · ') || '无显著影响';
}

const EFFECT_LABELS = {
  energy: '精力', budget: '经费', reputation: '声望',
  schoolFavor: '学校好感', teaching: '教学',
};

function resolveStudentFx(studentFx) {
  if (!studentFx) return [];
  if (typeof studentFx === 'function') return studentFx();
  return studentFx;
}

function resolveEvent(eventId, choiceIndex) {
  const event = RANDOM_EVENTS.find(e => e.id === eventId);
  if (!event) return;
  const choice = event.choices[choiceIndex];
  if (!choice) return;
  if (choice.condition && !choice.condition()) return;

  if (choice.effect) applyEffects(game.teacher, choice.effect);

  if (choice.studentFx) {
    const fxList = resolveStudentFx(choice.studentFx);
    for (const fx of fxList) {
      const st = game.students.find(s => s.name === fx.name);
      if (!st) continue;
      for (const [k, v] of Object.entries(fx)) {
        if (k === 'name') continue;
        st.stats[k] = clamp(st.stats[k] + v, 0, 100);
      }
    }
  }

  clampTeacher();
  addLog('event', `📢 ${event.title} — ${choice.text}`);

  // 事件后检查成就
  checkAchievements();

  document.getElementById('event-modal').classList.remove('active');

  setTimeout(() => {
    advanceWeek();
    autoSave();
  }, 300);
}

// ==================== 周推进 ====================

function advanceWeek() {
  game.week++;

  if (game.week > TOTAL_WEEKS) {
    determineEnding();
    return;
  }

  game.actionsLeft = ACTIONS_PER_WEEK;
  updateSemester();

  // 周结束检查成就
  checkAchievements();

  showWeekTransition();
  renderAll();
}

function updateSemester() {
  if (game.week <= 16) game.semester = 1;
  else if (game.week <= 32) game.semester = 2;
  else if (game.week <= 48) game.semester = 3;
  else game.semester = 4;
}

function applyEffects(target, effects) {
  if (!effects) return;
  for (const [key, value] of Object.entries(effects)) {
    if (Array.isArray(value)) {
      target[key] = (target[key] || 0) + randRange(value[0], value[1]);
    } else {
      target[key] = (target[key] || 0) + value;
    }
  }
}

function getStudent(name) {
  if (!game) return null;
  return game.students.find(s => s.name === name);
}

function addLog(type, msg) {
  game.history.push({ week: game.week, type, msg });
  // 裁剪 history
  if (game.history.length > HISTORY_MAX) {
    game.history = game.history.slice(-HISTORY_MAX);
  }
  if (game.weeklyLog.length >= 50) game.weeklyLog.shift();
  game.weeklyLog.push({ week: game.week, type, msg });
  renderLog();
}

function renderLog() {
  const area = document.getElementById('log-area');
  if (game.weeklyLog.length === 0) {
    area.innerHTML = '<div style="color:#666;text-align:center;padding:40px">📋 事件日志将显示在这里</div>';
    return;
  }
  area.innerHTML = game.weeklyLog.slice().reverse().map(e =>
    `<div class="log-entry ${e.type}">
      <span class="time">[第${e.week}周]</span>${e.msg}
    </div>`
  ).join('');
}

// ==================== 周过渡动画 ====================

function showWeekTransition() {
  const overlay = document.getElementById('week-transition');
  document.getElementById('wt-week').textContent = `第 ${game.week} 周`;
  document.getElementById('wt-semester').textContent = SEMESTER_NAMES[game.semester - 1];

  // 提示即将到来的比赛
  const nextComp = COMPETITIONS.find(c => c.week > game.week - 1 && c.week <= game.week + 3 && !game.competitionsDone.includes(c.id));
  document.getElementById('wt-competition').textContent = nextComp ? `⚔️ ${nextComp.name} 即将到来！` : '';

  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 1200);
}

// ==================== 成就系统 ====================

function unlockAchievement(id) {
  if (game.achievements.includes(id)) return;
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;

  game.achievements.push(id);
  addLog('achievement', `🏆 成就解锁：${ach.name} — ${ach.desc}`);
  showAchievementToast(ach);
  renderAchievements();
}

function showAchievementToast(ach) {
  const toast = document.getElementById('achievement-toast');
  document.getElementById('toast-achievement-name').textContent = ach.name;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function checkAchievements(context) {
  const t = game.teacher;
  const students = game.students;

  // 🎖️ 开门红：第一次比赛有人获奖
  if (context?.results && context.results.medaled > 0 && game.competitionsDone.length === 1) {
    unlockAchievement('first_medal');
  }

  // 🏅 全员获奖
  if (context?.results && context.results.medaled === context.results.students.length && context.results.students.length > 0) {
    unlockAchievement('all_medaled');
  }

  // 🥇 三金在手
  if (context?.results && context.results.topPerf >= 3) {
    unlockAchievement('triple_gold');
  }

  // 🏆 NOI金牌
  if (context?.competition && (context.competition.id === 'noi' || context.competition.id === 'noi2')) {
    if (context.results.topPerf > 0) {
      unlockAchievement('noi_gold');
    }
  }

  // 😄 快乐OI
  if (students.every(s => s.stats.mental >= 60)) {
    unlockAchievement('happy_oi');
  }

  // 😰 压力锅
  if (students.some(s => s.stats.mental < 10)) {
    unlockAchievement('pressure_cooker');
  }

  // ⚡ 永动机
  if (t.energy >= 95) {
    unlockAchievement('perpetual');
  }

  // 🦥 摸鱼专家
  if ((game.skipCount || 0) >= 5) {
    unlockAchievement('slacker');
  }

  // 📢 声名远扬
  if (t.reputation >= 80) {
    unlockAchievement('famous');
  }

  // 💰 财务自由
  if (t.budget >= 90) {
    unlockAchievement('rich');
  }

  // 💸 穷困潦倒
  if (t.budget < 5) {
    unlockAchievement('broke');
  }

  // 🧠 神犇诞生
  if (students.some(s => s.stats.algo >= 95)) {
    unlockAchievement('god_student');
  }

  // ⚖️ 全面发展
  if (students.every(s => s.stats.algo >= 50 && s.stats.mental >= 50)) {
    unlockAchievement('balanced');
  }
}

// ==================== 结局系统 ====================

function determineEnding() {
  game.ended = true;

  // 最终检查成就
  checkAchievements();

  const t = game.teacher;
  const bestStudent = [...game.students].sort((a, b) => b.stats.algo - a.stats.algo)[0];
  const avgAlgo = Math.round(game.students.reduce((s, st) => s + st.stats.algo, 0) / game.students.length);
  const avgMental = Math.round(game.students.reduce((s, st) => s + st.stats.mental, 0) / game.students.length);

  let ending;
  if (bestStudent.stats.algo >= 90 && t.reputation >= 70) {
    ending = { id: 'legend', title: '🌟 传奇教练',
      desc: `你的班级成为全省标杆。${bestStudent.name}拿下NOI金牌，保送清华。其他学生也各有斩获。校长亲自给你涨了工资，你成为了OI圈内人人敬仰的传奇教练。` };
  } else if (bestStudent.stats.algo >= 75 && t.reputation >= 50) {
    ending = { id: 'good', title: '🏅 金牌教练',
      desc: `在你的带领下，${bestStudent.name}拿下NOI银牌，多名学生获得省一等奖。班级整体实力在全省名列前茅。虽然不是完美结局，但这两年你问心无愧。` };
  } else if (t.reputation >= 60 && t.schoolFavor >= 50) {
    ending = { id: 'stable', title: '📋 稳定收官',
      desc: `学生成绩中规中矩，但你维护好了和校方的关系，拿到了稳定的经费。竞赛班得以延续，下一届还有机会。平平淡淡才是真。` };
  } else if (bestStudent.stats.algo >= 70 && t.schoolFavor < 30) {
    ending = { id: 'fired', title: '🔥 燃烧殆尽',
      desc: `你的学生确实进步很大，${bestStudent.name}甚至拿了NOI铜牌。但你不惜代价和校方对抗，最终被调离竞赛班。"人走了，但成绩留下了。"——你是这样安慰自己的。` };
  } else if (avgMental < 30) {
    ending = { id: 'burnout', title: '😭 全员崩溃',
      desc: `过度压榨让学生们集体崩溃。机房再也没有人来刷题了。你看着空荡荡的教室，想起那些曾经眼中有光的孩子。教育不是这样的。` };
  } else if (t.budget < 5 && avgAlgo < 40) {
    ending = { id: 'poor', title: '💸 一穷二白',
      desc: `经费被砍光，没有参考书，没有OJ会员，没有机房维护。两年过去了，学生们的主要成就大概是学会了在纸上写代码。竞赛班被校长无限期停办。` };
  } else if (t.energy < 20 && t.teaching < 30) {
    ending = { id: 'exhausted', title: '🛌 摆烂之王',
      desc: `你太累了。这两年来你几乎没认真教过一天书。学生们自生自灭，有人放弃了OI，有人靠自学勉强维持。你开始反思：当初为什么要接这个班？` };
  } else {
    ending = { id: 'mid', title: '🙂 还行吧',
      desc: `两年结束，班级成绩不好不坏。有几个省二，没有省一。校方不太满意但也懒得换人。下学期你可能还在这个位置上，也可能不在了。生活还在继续。` };
  }

  game.endingType = ending;
  game.history.push({ week: game.week, type: 'system', msg: '🏁 游戏结束：' + ending.title });

  // 清除存档
  localStorage.removeItem('oi_teacher_save');

  showEnding();
}

function showEnding() {
  const ending = game.endingType;
  const bestStudent = [...game.students].sort((a, b) => b.stats.algo - a.stats.algo)[0];

  // 成就徽章
  let achHtml = '';
  if (game.achievements.length > 0) {
    achHtml = `<div class="achievements-summary">`;
    for (const a of ACHIEVEMENTS) {
      const unlocked = game.achievements.includes(a.id);
      achHtml += `<span class="achievement-badge ${unlocked ? 'unlocked' : ''}">${a.name}</span>`;
    }
    achHtml += `</div>`;
  }

  document.getElementById('ending-screen').innerHTML = `
    <h2>🏁 两年期满</h2>
    <div class="ending-title">${ending.title}</div>
    <div class="ending-desc">${ending.desc}</div>
    <div class="stats-summary">
      教学水平: ${Math.round(game.teacher.teaching)} | 声望: ${Math.round(game.teacher.reputation)}<br>
      学校好感: ${Math.round(game.teacher.schoolFavor)} | 剩余经费: ${Math.round(game.teacher.budget)}<br>
      最强学生: ${bestStudent.name}（算法${bestStudent.stats.algo}）<br>
      学生榜: ${game.students.map(s => `${s.name}(算法${s.stats.algo})`).join(' · ')}
    </div>
    ${game.achievements.length > 0 ? `<div style="color:#8899aa;font-size:0.8em;margin-bottom:6px">🏆 获得成就：${game.achievements.length}/${ACHIEVEMENTS.length}</div>` : ''}
    ${achHtml}
    <button class="btn primary" onclick="startGame()">再来一次</button>
  `;
  showScreen('ending-screen');
}

// ==================== 存档系统 ====================

function autoSave() {
  if (!game || game.ended) return;
  saveGame(true);
}

function saveGame(silent) {
  if (!game || game.ended) return;
  // 去掉运行时字段，只存纯净数据
  const saveData = {
    version: SAVE_VERSION,
    week: game.week,
    semester: game.semester,
    actionsLeft: game.actionsLeft,
    ended: game.ended,
    endingType: game.endingType,
    teacher: { ...game.teacher },
    students: game.students.map(s => ({
      name: s.name, archetype: s.archetype, desc: s.desc,
      stats: { ...s.stats },
    })),
    history: game.history.slice(-HISTORY_MAX),
    achievements: [...game.achievements],
    competitionsDone: [...game.competitionsDone],
    eventsSeen: [...game.eventsSeen],
    weeklyLog: game.weeklyLog.slice(-50),
    skipCount: game.skipCount || 0,
  };
  try {
    localStorage.setItem('oi_teacher_save', JSON.stringify(saveData));
    if (!silent) {
      addLog('system', '💾 游戏已保存');
      renderAll();
    }
  } catch (e) {
    if (!silent) alert('存档失败：' + e.message);
  }
}

function loadGame() {
  const raw = localStorage.getItem('oi_teacher_save');
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    if (data.version !== SAVE_VERSION) {
      alert('存档版本不兼容，需要重新开始。');
      localStorage.removeItem('oi_teacher_save');
      return;
    }
    game = data;
    // 补充可能缺失的默认值
    game.achievements = game.achievements || [];
    game.eventsSeen = game.eventsSeen || [];
    game.competitionsDone = game.competitionsDone || [];
    game.weeklyLog = game.weeklyLog || [];
    game.history = game.history || [];
    game.skipCount = game.skipCount || 0;
    // 恢复运行时计数器
    runtimeCounters = { skipCount: game.skipCount };
    // 重新生成事件引用
    RANDOM_EVENTS = makeRandomEvents();
    showScreen('game-screen');
    renderAll();
  } catch (e) {
    alert('存档损坏：' + e.message);
  }
}

function resetGame() {
  if (confirm('确定要重新开始吗？当前进度将丢失。')) {
    localStorage.removeItem('oi_teacher_save');
    initGame();
    showScreen('title-screen');
    checkSaveExists();
  }
}

function checkSaveExists() {
  const raw = localStorage.getItem('oi_teacher_save');
  let has = false;
  if (raw) {
    try {
      const data = JSON.parse(raw);
      has = data.version === SAVE_VERSION;
    } catch (e) { /* ignore */ }
  }
  document.getElementById('btn-load').disabled = !has;
}

// Init
checkSaveExists();

// Auto-save on beforeunload
window.addEventListener('beforeunload', () => { if (game && !game.ended) autoSave(); });
</script>
